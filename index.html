<!DOCTYPE html>
<html>
<head>
<title>Six Feats Darts</title>
<style>
    body { font-family: Arial, sans-serif; background:#111; color:white; text-align:center; }
    #game { margin-top:20px; }
    button { padding:12px 20px; margin:8px; font-size:18px; border-radius:8px; cursor:pointer; }
    .disabled { opacity:0.25; pointer-events:none; }

    .avatar {
        width:60px; height:60px; border-radius:50%; object-fit:cover;
        border:3px solid teal; margin-bottom:10px;
    }

    #scoreboard { margin-top:25px; font-size:20px; }
    #scoreboard th, #scoreboard td { padding:10px 18px; }

    #winnerBanner {
        background:teal; color:white; padding:20px; font-size:26px;
        position:fixed; bottom:0; left:0; right:0; display:none;
    }

    /* NEXT ROUND ANIMATION */
    #roundAnim {
        position:fixed;
        top:40%;
        left:50%;
        transform:translate(-50%, -50%) scale(0.1);
        background:teal;
        padding:30px 60px;
        border-radius:20px;
        font-size:40px;
        opacity:0;
        transition:all 0.6s ease-out;
        pointer-events:none;
        z-index:999;
    }
    #roundAnim.show {
        opacity:1;
        transform:translate(-50%, -50%) scale(1);
    }
</style>
</head>
<body>

<h1>Six Feats Darts</h1>

<div id="setup">
    <h2>Enter Players & Upload Avatars</h2>
    <div id="playerInputs"></div>
    <button onclick="addPlayerField()">Add Player</button><br><br>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="game" style="display:none;">
    <h2 id="roundLabel"></h2>

    <div id="currentPlayerBox">
        <img id="currentAvatar" class="avatar">
        <h3 id="playerLabel"></h3>
    </div>

    <div id="buttons">
        <button id="btn1" onclick="score(1)">1 pt</button>
        <button id="btn2" onclick="score(2)">2 pts</button>
        <button id="btn3" onclick="score(3)">3 pts</button>
        <button id="innerBtn" onclick="score(3)">Inner</button>
        <button id="outerBtn" onclick="score(2)">Outer</button>
        <button onclick="score(0)">Miss</button>
        <button onclick="undo()">Undo</button>
    </div>

    <div id="scoreboard"></div>
</div>

<div id="winnerBanner"></div>
<div id="roundAnim"></div>

<script>
const roundNames = [
    "Target 1","Target 3","Target 5","Target 7","Target 9","Target 11",
    "Target 13","Bullseye","Target 15","Target 17","Target 19","Bullseye"
];

const playoffNames = [
    "Target 2","Bullseye","Target 4","Target 6","Bullseye",
    "Target 8","Bullseye","Target 10","Target 12","Bullseye"
];

let players = [];
let avatars = {};
let scores = {};
let round = 0;
let dart = 0;
let currentPlayer = 0;
let history = [];
let inPlayoffs = false;
let playoffPlayers = [];
let playoffRound = 0;

function addPlayerField() {
    let div = document.createElement("div");
    div.innerHTML = `
        <input type="text" placeholder="Player name">
        <input type="file" accept="image/*">
        <br><br>
    `;
    document.getElementById("playerInputs").appendChild(div);
}

addPlayerField(); // start with one

function startGame() {
    let inputs = document.querySelectorAll("#playerInputs div");

    inputs.forEach(div => {
        let name = div.querySelector("input[type=text]").value.trim();
        let file = div.querySelector("input[type=file]").files[0];

        if (!name) return;

        players.push(name);
        scores[name] = Array(12).fill(0);

        if (file) {
            let reader = new FileReader();
            reader.onload = e => avatars[name] = e.target.result;
            reader.readAsDataURL(file);
        } else {
            avatars[name] = ""; // no avatar
        }
    });

    if (players.length === 0) return;

    document.getElementById("setup").style.display = "none";
    document.getElementById("game").style.display = "block";

    updateUI();
}

function isBullseyeRound() {
    if (!inPlayoffs) return roundNames[round].includes("Bullseye");
    return playoffNames[playoffRound].includes("Bullseye");
}

function showRoundAnimation(text) {
    let anim = document.getElementById("roundAnim");
    anim.innerHTML = text;
    anim.classList.add("show");
    setTimeout(() => anim.classList.remove("show"), 900);
}

function score(points) {
    let p = inPlayoffs ? playoffPlayers[currentPlayer] : players[currentPlayer];
    let r = inPlayoffs ? playoffRound : round;

    history.push({player:p, round:r, dart:dart, points:points});

    if (!inPlayoffs) scores[p][r] += points;
    else scores[p][12 + r] = (scores[p][12 + r] || 0) + points;

    dart++;
    if (dart === 3) {
        dart = 0;
        currentPlayer++;

        let endOfPlayers = (!inPlayoffs && currentPlayer === players.length) ||
                           (inPlayoffs && currentPlayer === playoffPlayers.length);

        if (endOfPlayers) {
            currentPlayer = 0;

            if (!inPlayoffs) {
                round++;
                if (round < 12) showRoundAnimation("Next Round: " + roundNames[round]);
                if (round === 12) return finishRegulation();
            } else {
                playoffRound++;
                if (playoffRound < playoffNames.length)
                    showRoundAnimation("Next Round: " + playoffNames[playoffRound]);
                checkPlayoffWinner();
            }
        }
    }
    updateUI();
}

function undo() {
    if (history.length === 0) return;
    let last = history.pop();

    if (!inPlayoffs) scores[last.player][last.round] -= last.points;
    else scores[last.player][12 + last.round] -= last.points;

    dart = last.dart;
    currentPlayer = (inPlayoffs ? playoffPlayers.indexOf(last.player) : players.indexOf(last.player));
    updateUI();
}

function finishRegulation() {
    let totals = players.map(p => ({
        name:p,
        total:scores[p].reduce((a,b)=>a+b,0)
    }));

    let max = Math.max(...totals.map(t=>t.total));
    let tied = totals.filter(t => t.total === max);

    if (tied.length === 1) {
        showWinner(tied[0].name);
        return;
    }

    inPlayoffs = true;
    playoffPlayers = tied.map(t=>t.name);
    playoffPlayers.forEach(p => scores[p][12] = 0);
    playoffRound = 0;
    round = 0;
    currentPlayer = 0;
    dart = 0;

    alert(tied.map(t=>t.name).join(", ") + " advance to the playoffs!");
    updateUI();
}

function checkPlayoffWinner() {
    if (playoffRound < playoffNames.length) return;

    let totals = playoffPlayers.map(p => ({
        name:p,
        total:Object.values(scores[p]).reduce((a,b)=>a+b,0)
    }));

    let max = Math.max(...totals.map(t=>t.total));
    let tied = totals.filter(t => t.total === max);

    if (tied.length === 1) {
        showWinner(tied[0].name);
        return;
    }

    playoffRound = 0;
}

function showWinner(name) {
    let banner = document.getElementById("winnerBanner");
    banner.innerHTML = name + " WINS!";
    banner.style.display = "block";
}

function updateUI() {
    document.getElementById("roundLabel").innerHTML =
        inPlayoffs ? playoffNames[playoffRound] : roundNames[round];

    let p = inPlayoffs ? playoffPlayers[currentPlayer] : players[currentPlayer];

    document.getElementById("playerLabel").innerHTML = p + " (Dart " + (dart+1) + "/3)";
    document.getElementById("currentAvatar").src = avatars[p] || "";

    let bull = isBullseyeRound();

    document.getElementById("btn1").classList.toggle("disabled", bull);
    document.getElementById("btn2").classList.toggle("disabled", bull);
    document.getElementById("btn3").classList.toggle("disabled", bull);

    document.getElementById("innerBtn").classList.toggle("disabled", !bull);
    document.getElementById("outerBtn").classList.toggle("disabled", !bull);

    let html = "<h3>Scoreboard</h3><table style='margin:auto; border-collapse:collapse;'>";
    html += "<tr><th>Avatar</th><th>Player</th>";

    let labels = inPlayoffs ? playoffNames : roundNames;
    labels.forEach(r => html += "<th>"+r+"</th>");
    html += "<th>Total</th></tr>";

    let list = inPlayoffs ? playoffPlayers : players;

    list.forEach(p => {
        html += "<tr>";
        html += `<td><img src="${avatars[p] || ""}" class="avatar" style="width:40px;height:40px;"></td>`;
        html += "<td>"+p+"</td>";

        let total = 0;
        labels.forEach((r,i)=>{
            let val = inPlayoffs ? (scores[p][12+i] || 0) : scores[p][i];
            html += "<td>"+val+"</td>";
            total += val;
        });
        html += "<td>"+total+"</td></tr>";
    });

    html += "</table>";
    document.getElementById("scoreboard").innerHTML = html;
}
</script>

</body>
</html>
